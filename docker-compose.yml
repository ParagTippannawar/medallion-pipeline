services:

  redpanda:
    image: redpandadata/redpanda:latest
    container_name: medallion-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "512M"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
    ports:
      - "9092:9092"
      - "9644:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: medallion-console
    ports:
      - "8080:8080"
    environment:
      - KAFKA_BROKERS=redpanda:9092
    depends_on:
      - redpanda

  postgres:
    image: postgres:15
    container_name: medallion-postgres
    environment:
      POSTGRES_USER: medallion
      POSTGRES_PASSWORD: medallion
      POSTGRES_DB: medallion
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medallion -d medallion"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    image: apache/airflow:2.9.1
    container_name: medallion-airflow
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://medallion:medallion@postgres:5432/medallion
      - AIRFLOW__CORE__LOAD_EXAMPLES= false
      - AIRFLOW__WEBSERVER__SECRET_KEY=medallion_secret
    volumes:
      - ./dags:/opt/airflow/dags
      - ./medallion_dbt:/opt/airflow/logs
      - ./medallion_dbt:/opt/airflow/medallion_dbt
    ports:
      - "8081:8080"
    command: >
      bash -c "
      pip install dbt-core==1.8.0 dbt-postgres==1.8.0 &&
      airflow db init &&
      airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email tippannawarparag@gmail.com || true &&
      airflow webserver & airflow scheduler"

volumes:
  postgres_data: